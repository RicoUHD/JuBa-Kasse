name: Docker Image

on:
  release:
    types: [published, released]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Floating 'latest' tag: applies ONLY to stable releases
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            
            # Floating 'beta' tag: applies ONLY to pre-releases
            type=raw,value=beta,enable=${{ github.event_name == 'release' && github.event.release.prerelease == true }}
            
            # The exact version from the Git tag (e.g., v1.3.0 or v1.3.1-beta)
            type=ref,event=tag
            
            # Short commit SHA for precise traceability
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
